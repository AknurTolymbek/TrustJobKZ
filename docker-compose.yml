services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trustjobkz-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: trustjobkz-frontend
    environment:
      VITE_API_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
